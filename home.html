<!DOCTYPE html>
<html>
  <head>
    <!-- Tells the browser to support nearly every character symbol -->
    <meta charset=""UTF-8" />
    <!-- viewport displays layout properly in mobile; set to device"s screen width rather than desktop size, sets initial zoom to 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Browser tab name -->
    <title>Teri Sky</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- MOBILE TOPBAR: Logo + hamburger menu side by side -->
    <div class="mobile-topbar">
      <div class="logo">Logo here</div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <!-- Gray transparent OVERLAY when hamburger menu is in use -->
    <div class="overlay" id="overlay"></div>

    <div class="layout">
      <!-- LEFT SIDEBAR NAV -->
      <nav class="sidebar" id="sidebar">
        <!-- Logo shown on desktop only; hidden on mobile -->
        <div class="logo">Logo here</div>
        <!-- Socials -->
        <a href="https://instagram.com/teriskyart" class="social-link" target="_blank" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>

        <ul>
          <li><a href="#" class="nav-link">Gallery</a></li>
          <li><a href="/about.html" class="nav-link">About</a></li>
        </ul>
      </nav>
    
    </div>
  </body>
</html>
